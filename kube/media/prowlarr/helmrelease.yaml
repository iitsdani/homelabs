---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: prowlarr
  namespace: media
spec:
  repo: https://bjw-s-labs.github.io/helm-charts
  chart: app-template
  version: 4.6.2
  targetNamespace: media
  valuesContent: |-
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 200m

    service:
      main:
        type: ClusterIP
        controller: main
        ports:
          http:
            port: 9696

    ingress:
      tailscale:
        className: tailscale
        enabled: true
        hosts:
          - host: nl-prowlarr
            paths:
              - path: "/"
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts: [nl-prowlarr]

    controllers:
      main:
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            env:
              PGID: 1000
              PGUID: 1000
              TZ: Europe/Amsterdam
            image:
              repository: ghcr.io/linuxserver/prowlarr
              tag: 2.3.5@sha256:c9fe528f34b1fd3715438b6f6d6991d64e2965f2c055db36398bc66a0e7eab01
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: false }

    persistence:
      config:
        enabled: true
        existingClaim: prowlarr-config-v2
        globalMounts: [{ path: /config }]
        type: persistentVolumeClaim
      media:
        enabled: true
        existingClaim: media-data-v4
        globalMounts: [{ path: /data }]
        type: persistentVolumeClaim
