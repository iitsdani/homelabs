---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: home-assistant
      valuesObject:
        defaultPodOptions:
          hostNetwork: true

        controllers:
          main:
            type: deployment
            replicas: 1
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: ghcr.io/home-assistant/home-assistant
                  tag: "2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716"
                env:
                  TZ: Europe/Amsterdam
                  PYTHONPATH: /config/deps
                  UV_SYSTEM_PYTHON: "true"
                  UV_NO_CACHE: "true"
                envFrom:
                  - secretRef:
                      name: home-assistant-oauth-secrets
                probes:
                  liveness:
                    enabled: false
                  readiness:
                    enabled: false
                  startup:
                    enabled: true

        service:
          main:
            controller: main
            type: ClusterIP
            ports:
              http:
                port: 8123

        ingress:
          tailscale:
            enabled: true
            className: tailscale
            hosts:
              - host: &host hass
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - hosts:
                  - *host

        persistence:
          tmp:
            enabled: true
            type: emptyDir
            globalMounts:
              - path: /tmp
          udev:
            enabled: true
            type: hostPath
            hostPath: /run/udev
            globalMounts:
              - path: /run/udev
          dbus:
            enabled: true
            type: hostPath
            hostPath: /run/dbus
            globalMounts:
              - path: /run/dbus
                readOnly: true
          config:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: home-assistant-config-v2
            globalMounts:
              - path: /config
          secrets:
            enabled: true
            type: secret
            name: home-assistant-secrets
            globalMounts:
              - path: /config/secrets.yaml
                subPath: secrets.yaml
                readOnly: true
          configuration:
            enabled: true
            type: configMap
            name: home-assistant-configuration
            globalMounts:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
                readOnly: true
              - path: /config/scenes.yaml
                subPath: scenes.yaml
                readOnly: true
              - path: /config/scripts.yaml
                subPath: scripts.yaml
                readOnly: true
          automations:
            enabled: true
            type: configMap
            name: home-assistant-automations
            globalMounts:
              - path: /config/automations
                readOnly: true
  destination:
    name: in-cluster
    namespace: home-automation
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
