---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: home-assistant
      valuesObject:
        defaultPodOptions:
          hostNetwork: true

        controllers:
          main:
            type: deployment
            replicas: 1
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: ghcr.io/home-assistant/home-assistant
                  tag: "2026.7.3@sha256:6937c6c51d2f5d6aa66d97e4a68f845bcccd5f9b62cd91992bd6d79b20fe2b3c"
                env:
                  TZ: Europe/Amsterdam
                  PYTHONPATH: /config/deps
                  UV_SYSTEM_PYTHON: "true"
                  UV_NO_CACHE: "true"
                envFrom:
                  - secretRef:
                      name: home-assistant-oauth-secrets
                probes:
                  liveness:
                    enabled: false
                  readiness:
                    enabled: false
                  startup:
                    enabled: true

        service:
          main:
            controller: main
            type: ClusterIP
            ports:
              http:
                port: 8123
                primary: true

        route:
          internal-gw:
            enabled: true
            kind: HTTPRoute
            hostnames:
              - hass.home.cianfr.one
            parentRefs:
              - name: internal-gw
                namespace: networking
                sectionName: https
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - identifier: main

        persistence:
          tmp:
            enabled: true
            type: emptyDir
            globalMounts:
              - path: /tmp
          udev:
            enabled: true
            type: hostPath
            hostPath: /run/udev
            globalMounts:
              - path: /run/udev
          dbus:
            enabled: true
            type: hostPath
            hostPath: /run/dbus
            globalMounts:
              - path: /run/dbus
                readOnly: true
          config:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: home-assistant-config-v2
            globalMounts:
              - path: /config
          secrets:
            enabled: true
            type: secret
            name: home-assistant-secrets
            globalMounts:
              - path: /config/secrets.yaml
                subPath: secrets.yaml
                readOnly: true
          configuration:
            enabled: true
            type: configMap
            name: home-assistant-configuration
            globalMounts:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
                readOnly: true
              - path: /config/scenes.yaml
                subPath: scenes.yaml
                readOnly: true
              - path: /config/scripts.yaml
                subPath: scripts.yaml
                readOnly: true
          automations:
            enabled: true
            type: configMap
            name: home-assistant-automations
            globalMounts:
              - path: /config/automations
                readOnly: true
  destination:
    name: in-cluster
    namespace: home-automation
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
