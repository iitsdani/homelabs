---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - application.yaml
  - mosquitto-data.yaml

configMapGenerator:
  - name: mosquitto-config
    namespace: home-automation
    files:
      - mosquitto.conf

generatorOptions:
  disableNameSuffixHash: true
