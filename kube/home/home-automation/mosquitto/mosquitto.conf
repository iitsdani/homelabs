# Eclipse Mosquitto configuration
# See: https://mosquitto.org/man/mosquitto-conf-5.html

# MQTT listener on port 1883 (bound to all interfaces)
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener on port 1882 (for parity with mochi-mqtt)
listener 1882 0.0.0.0
protocol websockets

# Allow anonymous connections (matches mochi-mqtt allow_all: true)
allow_anonymous true

# Persistence (stores retained messages, subscriptions)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
