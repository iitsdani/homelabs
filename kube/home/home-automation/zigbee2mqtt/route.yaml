---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zigbee2mqtt
spec:
  hostnames:
    - z2m.home.cianfr.one
  parentRefs:
    - name: internal-gw
      namespace: networking
      sectionName: https
  rules:
