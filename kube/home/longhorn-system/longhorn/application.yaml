---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.11.3
      helm:
        releaseName: longhorn
        valueFiles:
          - $values/kube/home/longhorn-system/longhorn/values.yaml
    - repoURL: git@github.com:iitsdani/homelabs.git
      targetRevision: refs/heads/main
      ref: values
  destination:
    name: in-cluster
    namespace: longhorn-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
