---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: longhorn
      version: "1.11.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  releaseName: longhorn
  targetNamespace: longhorn-system
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    longhornUI:
      replicas: 2
    metrics:
      serviceMonitor:
        enabled: true
    ingress:
      enabled: true
      ingressClassName: tailscale
      host: nl-longhorn
      tls: true
    defaultSettings:
      v1DataEngine: false
      v2DataEngine: true
      storageMinimalAvailablePercentage: "10"
      allowCollectingLonghornUsageMetrics: false
      autoCleanupSnapshotWhenDeleteBackup: true
      autoCleanupSnapshotAfterOnDemandBackupCompleted: true
      snapshotDataIntegrityImmediateCheckAfterSnapshotCreation: enabled
      detachManuallyAttachedVolumesWhenCordoned: true
      rwxVolumeFastFailover: true
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      replicaSoftAntiAffinity: false
      replicaAutoBalance: best-effort
      lockedVolumeAutoCleanup: true
      freezeFilesystemForSnapshot: enabled
      concurrentAutomaticEngineUpgradePerNodeLimit: 3
      replicaReplenishmentWaitInterval: 60
    defaultBackupStore:
      backupTarget: nfs://truenas.home.arpa:/mnt/zpool-nl-01/longhorn-backups-v2?nfsOptions=soft,timeo=330,retrans=3
      pollInterval: 300
