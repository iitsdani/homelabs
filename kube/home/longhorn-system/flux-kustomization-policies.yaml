---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-policies
  namespace: flux-system
spec:
  interval: 5m
  path: ./kube/home/longhorn-system/policies
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: longhorn-system