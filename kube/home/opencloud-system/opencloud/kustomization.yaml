---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - application.yaml
  - opencloud-data-v3.yaml

generators:
  - ksops.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: opencloud-config
    files:
      - csp.yaml
      - proxy.yaml
