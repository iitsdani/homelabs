---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mktxp
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: mktxp
      valuesObject:
        controllers:
          mktxp:
            annotations:
              reloader.stakater.com/auto: "true"
            strategy: Recreate
            containers:
              app:
                image:
                  repository: ghcr.io/akpw/mktxp
                  tag: 1.2.17
                command: ["mktxp"]
                args: ["--cfg-dir", "/mktxp_config", "export"]
                env:
                  TZ: Europe/Amsterdam
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    memory: 256Mi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /metrics
                        port: &port 49090
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 3
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /metrics
                        port: *port
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 3
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]

        defaultPodOptions:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000

        service:
          app:
            controller: mktxp
            ports:
              metrics:
                port: *port

        serviceMonitor:
          app:
            serviceName: mktxp
            endpoints:
              - port: metrics
                path: /metrics
                interval: 30s
                scrapeTimeout: 25s

        persistence:
          config:
            type: secret
            name: mktxp-credentials
            globalMounts:
              - path: /mktxp_config
                readOnly: true
  destination:
    name: in-cluster
    namespace: telemetry
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
