---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.authelia.com
      chart: authelia
      targetRevision: 0.11.5
      helm:
        releaseName: authelia
        valueFiles:
          - $values/kube/home/auth/authelia/values-authelia.yaml
    - repoURL: git@github.com:iitsdani/homelabs.git
      targetRevision: main
      ref: values
  destination:
    name: in-cluster
    namespace: auth
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
