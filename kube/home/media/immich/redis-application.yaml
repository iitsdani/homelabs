---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-redis
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://ot-container-kit.github.io/helm-charts
    chart: redis
    targetRevision: 0.16.9
    helm:
      releaseName: immich-redis
      valuesObject:
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: longhorn-nvme-3-replicas
              resources:
                requests:
                  storage: 200Mi

        externalConfig:
          enabled: true
          data: ""

        redisExporter:
          enabled: true

        serviceMonitor:
          enabled: true
  destination:
    name: in-cluster
    namespace: media
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
