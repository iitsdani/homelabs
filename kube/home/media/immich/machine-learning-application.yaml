---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-machine-learning
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: immich-machine-learning
      valuesObject:
        defaultPodOptions:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: cianfr.one/gpu.transcoding.speed
                        operator: In
                        values:
                          - fast

        service:
          main:
            type: ClusterIP
            controller: main
            ports:
              http:
                port: &http-port 3003

        controllers:
          main:
            type: deployment
            replicas: 1
            strategy: Recreate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: ghcr.io/immich-app/immich-machine-learning
                  tag: v3.0.3-openvino
                env:
                  TRANSFORMERS_CACHE: /cache
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"
                probes:
                  liveness: { enabled: false }
                  readiness: { enabled: false }
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /ping
                        port: *http-port
                      initialDelaySeconds: 0
                      periodSeconds: 10
                      timeoutSeconds: 1
                      failureThreshold: 30

        persistence:
          cache:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: immich-ml-cache-v3
            globalMounts: [{ path: /cache }]
  destination:
    name: in-cluster
    namespace: media
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
