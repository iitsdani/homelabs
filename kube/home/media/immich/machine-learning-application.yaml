---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-machine-learning
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      targetRevision: 5.0.1
      helm:
        releaseName: immich-machine-learning
        valueFiles:
          - $values/kube/home/media/immich/values-machine-learning.yaml
    - repoURL: git@github.com:iitsdani/homelabs.git
      targetRevision: main
      ref: values
  destination:
    name: in-cluster
    namespace: media
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
