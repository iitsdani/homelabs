---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bazarr
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: bazarr
      valuesObject:
        defaultPodOptions:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsUser: 1000

        service:
          main:
            type: ClusterIP
            controller: main
            ports:
              http:
                port: 6767

        ingress:
          tailscale:
            className: tailscale
            enabled: true
            hosts:
              - host: bazarr
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - hosts: [bazarr]

        controllers:
          main:
            type: deployment
            replicas: 1
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                env:
                  PGID: 1000
                  PGUID: 1000
                  TZ: Europe/Amsterdam
                image:
                  repository: ghcr.io/linuxserver/bazarr
                  tag: 1.6.0@sha256:4c30dc0bb9a5d223075e7f5d12c77bd293c4b460f86d696dbe64763104c1e88c
                probes:
                  liveness: { enabled: false }
                  readiness: { enabled: false }
                  startup: { enabled: true }

        persistence:
          config:
            enabled: true
            existingClaim: bazarr-config
            globalMounts: [{ path: /config }]
            type: persistentVolumeClaim
          media:
            enabled: true
            existingClaim: media-data-v4
            globalMounts: [{ path: /data }]
            type: persistentVolumeClaim
  destination:
    name: in-cluster
    namespace: media
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
