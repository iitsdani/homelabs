---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sabnzbd
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      releaseName: sabnzbd
      valuesObject:
        defaultPodOptions:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsUser: 1000
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: cianfr.one/networking.linkspeed
                        operator: In
                        values:
                          - 2500Mbits

        service:
          main:
            type: ClusterIP
            controller: main
            ports:
              http:
                port: 8080

        ingress:
          tailscale:
            className: tailscale
            enabled: true
            hosts:
              - host: &host sabnzbd.tail2ff90.ts.net
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - hosts: [*host]

        controllers:
          main:
            type: deployment
            replicas: 1
            strategy: Recreate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                env:
                  PGID: 1000
                  PGUID: 1000
                  TZ: Europe/Amsterdam
                image:
                  repository: ghcr.io/linuxserver/sabnzbd
                  tag: 5.0.3@sha256:f567ed2e26b964690e93d708d9660db011fcd0a4057f927cae1b6ec23387efd5
                probes:
                  liveness: { enabled: false }
                  readiness: { enabled: false }
                  startup: { enabled: true }

        persistence:
          config:
            enabled: true
            existingClaim: sabnzbd-config-v2
            globalMounts: [{ path: /config }]
            type: persistentVolumeClaim
          downloads:
            enabled: true
            existingClaim: sabnzbd-downloads-v2
            globalMounts: [{ path: /downloads }]
            type: persistentVolumeClaim
          media:
            enabled: true
            existingClaim: media-data-v4
            globalMounts: [{ path: /data }]
            type: persistentVolumeClaim
  destination:
    name: in-cluster
    namespace: media
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
