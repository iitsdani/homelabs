---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-system
  namespace: flux-system
spec:
  interval: 1h
  path: ./kube/home/kyverno-system
  sourceRef:
    kind: GitRepository
    name: flux
    namespace: flux-system
  prune: true
  wait: true
  timeout: 10m
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-age-key
  dependsOn:
    - name: flux-system
