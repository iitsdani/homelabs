---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: kyverno
      version: "3.7.x"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  releaseName: kyverno
  targetNamespace: kyverno-system
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  driftDetection:
    mode: enabled
