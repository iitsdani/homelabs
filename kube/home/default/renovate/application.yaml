---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://renovatebot.github.io/helm-charts
      chart: renovate
      targetRevision: 46.237.3
      helm:
        releaseName: renovate
        valueFiles:
          - $values/kube/home/default/renovate/values.yaml
    - repoURL: git@github.com:iitsdani/homelabs.git
      targetRevision: main
      ref: values
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
