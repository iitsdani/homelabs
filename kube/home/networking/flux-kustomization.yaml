---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: networking
  namespace: flux-system
spec:
  interval: 1h
  path: ./kube/home/networking
  sourceRef:
    kind: GitRepository
    name: flux
    namespace: flux-system
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: flux-system
