---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-gateway-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cilium-gateway-canary
      app.kubernetes.io/instance: cilium-gateway-canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cilium-gateway-canary
        app.kubernetes.io/instance: cilium-gateway-canary
        app.kubernetes.io/component: echo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: echo
          image: docker.io/hashicorp/http-echo:1.0.0@sha256:fcb75f691c8b0414d670ae570240cbf95502cc18a9ba57e982ecac589760a186
          args:
            - -listen=:8080
            - -text=cilium-gateway-canary
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
