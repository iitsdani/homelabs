---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-crds
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://registry-1.docker.io/envoyproxy/gateway-crds-helm
    path: .
    targetRevision: v1.8.2
    helm:
      releaseName: envoy-gateway-crds
      valuesObject:
        crds:
          gatewayAPI:
            enabled: false
          envoyGateway:
            enabled: true
  destination:
    name: in-cluster
    namespace: networking
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
