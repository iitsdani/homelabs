---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      releaseName: cert-manager
      valuesObject:
        # To fix the issue with `tls: failed to verify certificate`.
        # Source: https://github.com/cert-manager/cert-manager/issues/7502#issuecomment-2585460045
        global:
          leaderElection:
            namespace: networking
        crds:
          enabled: true
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true
  destination:
    name: in-cluster
    namespace: networking
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
