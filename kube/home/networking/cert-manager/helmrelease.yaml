---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: networking
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  releaseName: cert-manager
  targetNamespace: networking
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    global:
      leaderElection:
        namespace: networking
    crds:
      enabled: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true