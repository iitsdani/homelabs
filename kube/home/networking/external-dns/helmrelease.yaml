---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
  namespace: networking
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  releaseName: external-dns-cloudflare
  targetNamespace: networking
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    provider: cloudflare
    managedRecordTypes:
      - A
      - AAAA
      - CNAME
    domainFilters:
      - cianfr.one
    sources:
      - ingress
      - gateway-httproute
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-secrets
            key: CLOUDFLARE_API_TOKEN
    serviceMonitor:
      enabled: true