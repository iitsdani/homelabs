---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tailscale-operator
  namespace: kube-system
spec:
  bootstrap: true
  repo: https://pkgs.tailscale.com/helmcharts
  chart: tailscale-operator
  version: "1.98.3"
  targetNamespace: networking
  valuesContent: |-
    operatorConfig:
      hostname: "home-k8s"
    apiServerProxyConfig:
      mode: "true"
