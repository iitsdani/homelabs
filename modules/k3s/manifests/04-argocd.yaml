---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: argocd
  namespace: kube-system
spec:
  bootstrap: true
  repo: https://argoproj.github.io/argo-helm
  chart: argo-cd
  version: "10.1.1"
  targetNamespace: argo-system
  createNamespace: true
  valuesContent: |-
    # Lean, single-instance setup. No SSO/OIDC, no HA.
    redis-ha:
      enabled: false

    redis:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    dex:
      enabled: false

    notifications:
      enabled: false

    controller:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

    server:
      replicas: 1
      autoscaling:
        enabled: false
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 512Mi
      ingress:
        enabled: true
        ingressClassName: tailscale
        hostname: argocd
        tls: true
      ingressGrpc:
        enabled: true
        ingressClassName: tailscale
        hostname: argocd-grpc
        tls: true

    repoServer:
      replicas: 1
      autoscaling:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

      # kustomize-sops integration source:
      # https://github.com/viaduct-ai/kustomize-sops?tab=readme-ov-file#argocdgitops-operator-w-ksopsagekey-in-okd4ocp4
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: sops-age
          secret:
            secretName: argocd-ksops-age-keys

      env:
        - name: XDG_CONFIG_HOME
          value: /.config
        - name: SOPS_AGE_KEY_FILE
          value: /.config/sops/age/keys.txt

      initContainers:
        - name: install-ksops
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux

              apk add --no-cache ca-certificates curl tar
              case "$(uname -m)" in
                x86_64|amd64) ARCH="x86_64" ;;
                aarch64|arm64) ARCH="arm64" ;;
                *) echo "unsupported arch: $(uname -m)"; exit 1 ;;
              esac

              VERSION="v4.4.0"
              VERSION_RAW="${VERSION#v}"
              URL="https://github.com/viaduct-ai/kustomize-sops/releases/download/${VERSION}/ksops_${VERSION_RAW}_Linux_${ARCH}.tar.gz"

              curl -fsSL -o ksops.tar.gz "$URL"
              tar -C /custom-tools -xzf ksops.tar.gz ksops
              chmod +x /custom-tools/ksops
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools

      volumeMounts:
        - mountPath: /usr/local/bin/ksops
          name: custom-tools
          subPath: ksops
        - mountPath: /.config/sops/age
          name: sops-age

    applicationSet:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 512Mi

    configs:
      cm:
        # Kustomize build options:
        # --enable-helm: Enabling Helm chart rendering with Kustomize
        # --load-restrictor LoadRestrictionsNone: Local kustomizations may load files from outside their root
        #
        # For viaduct-ai/kustomize-sops:
        # --enable-alpha-plugins: Enable the use of alpha plugins, which are not yet considered stable
        # --enable-exec: Enable the use of exec plugins
        kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone --enable-alpha-plugins --enable-exec"
        # Slow down reconciliation loop since this is a low-churn homelab repo.
        timeout.reconciliation: 5m
        timeout.reconciliation.jitter: 2m
        # Exclude certain resources from ArgoCD management
        # https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#resource-exclusioninclusion
        # Ignore VolumeSnapshot and VolumeSnapshotContent: Created by backup processes.
        resource.exclusions: |
          - apiGroups:
              - snapshot.storage.k8s.io
            kinds:
              - VolumeSnapshot
              - VolumeSnapshotContent
            clusters:
              - "*"
          - apiGroups:
              - cilium.io
            kinds:
              - CiliumIdentity
            clusters:
              - "*"
      params:
        # Lower processor counts to match single-controller-replica, low app count.
        controller.status.processors: "5"
        controller.operation.processors: "3"
        reposerver.parallelism.limit: "1"
        applicationsetcontroller.concurrent.reconciliations.max: "3"
